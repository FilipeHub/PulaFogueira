<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PULA FOGUEIRA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="game-header">
        <img src="images/logo_pula_semfundo.png" alt="Logo" class="game-logo">
        <h1 class="game-title">PULA FOGUEIRA</h1>
    </header>
    <div class="game-container">
        <div id="background"></div>
        <div id="score">0</div>
        <div id="high-score">MAIOR: 0</div>
        <div id="game-over" class="hidden">SE LASCOU!</div>
        <div id="ground"></div>
        <div id="dino"></div>
        <div id="cactus" class="hidden"></div>
    </div>
    <div class="instructions">
        <p class="instruction-text">Pressione <strong>ESPAÇO</strong> ou <strong>↑</strong> para pular &bull; Toque na
            tela no celular</p>
        <button id="restart-button">ACUNHA!</button>
        <p class="credits">Feito por Filipe, Mateus e Rafael</p>
    </div>
    <audio id="game-music" loop>
        <source src="audios/pula-fogueira.m4a" type="audio/mp4">
    </audio>
    <script src="script.js"></script>
</body>

</html>
