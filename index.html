<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PULA FOGUEIRA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@400;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Londrina+Solid:wght@400;900&display=swap" rel="stylesheet">
<link rel="icon" href='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>'>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="game-header">
        <img src="images/logo02.png" alt="Logo" class="game-logo">
        <h1 class="game-title">PULA FOGUEIRA</h1>
    </header>


    <div class="game-container">
        <div id="background"></div>
        <div id="player-setup"></div>
        <div id="ranking"></div>
        <div id="high-score"> Dono da fogueira: 0 </div>
        <div id="score">0</div>
        <div id="game-over" class="hidden">Virou Brasa!</div>
        <div id="ground"></div>
        <div id="dino"></div>
        <div id="cactus" class="hidden"></div>
    </div>


    <div class="instructions">
        
        <div class="controls">
            <input  type="text"  id="player-name"  placeholder="Seu nome aqui..." maxlength="15"/>
            <button id="restart-button">BORA!</button>
        </div>
        <p class="instruction-text">
            <span class="fire">🔥</span>
            Olha a fogueira! <span class="fire">🔥</span> Pressione <strong>↑</strong> para pular!
            
        </p>
    </div>

    <audio id="game-music" loop>
        <source src="audios/pula-fogueira.m4a" type="audio/mp4">
    </audio>
    <script src="script.js"></script>
    <footer> Soft Snow - 2026</footer>

</body>

</html>
